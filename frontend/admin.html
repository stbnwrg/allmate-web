<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CMS | Allmate Motors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin-cms.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <span class="brand-mark"><img src="images/branding/logo-principal.jpeg" alt="Logo Allmate"></span>
        <span class="brand-copy">
          <span class="brand-title">Allmate Motors</span>
          <span class="brand-subtitle">Mini CMS</span>
        </span>
      </a>
      <button id="logout-btn" class="btn btn-dark" style="display:none;">Salir</button>
    </div>
  </header>

  <main class="section" style="padding-top:32px;">
    <div class="container">
      <div id="admin-alert" class="alert"></div>

      <section id="login-view" class="admin-login-card">
        <span class="badge">Backoffice</span>
        <h1 class="section-title">Ingreso administrador</h1>
        <p class="section-lead">Un solo acceso, pero ahora con control por página, sección y subsección. Nada de editar HTML como en 2009.</p>
        <form id="login-form" class="form-grid">
          <div class="field full"><label>Email</label><input id="admin_email" type="email" required></div>
          <div class="field full"><label>Contraseña</label><input id="admin_password" type="password" required></div>
          <div class="field full"><button class="btn btn-block" type="submit">Entrar al CMS</button></div>
        </form>
      </section>

      <section id="dashboard-view" style="display:none;">
        <div class="cms-shell">
          <aside class="cms-sidebar">
            <div class="cms-sidebar-head">
              <span class="badge">Contenido</span>
              <h2>Mini CMS</h2>
              <p>Edita la web por página y por sección.</p>
            </div>
            <nav id="cms-page-nav" class="cms-page-nav"></nav>
            <div class="cms-sidebar-footer">
              <button id="btn-new-page" class="btn btn-dark btn-block" type="button">Nueva página</button>
              <button id="btn-open-settings" class="btn btn-block" type="button">Ajustes globales</button>
            </div>
          </aside>

          <section class="cms-main">
            <div class="cms-main-topbar">
              <div>
                <span class="badge">Edición</span>
                <h1 id="cms-page-title" class="section-title">Selecciona una página</h1>
              </div>
              <div class="cms-top-actions">
                <button id="btn-edit-page" class="btn btn-dark" type="button">Editar página</button>
                <button id="btn-new-section" class="btn" type="button">Nueva sección</button>
              </div>
            </div>

            <div id="cms-page-meta" class="cms-meta"></div>
            <div id="cms-sections-wrap" class="cms-sections-wrap"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <div id="cms-modal" class="cms-modal" aria-hidden="true">
    <div class="cms-modal-backdrop" data-close-modal="true"></div>
    <div class="cms-modal-dialog">
      <div class="cms-modal-head">
        <h3 id="cms-modal-title">Editar</h3>
        <button class="cms-icon-btn" data-close-modal="true" aria-label="Cerrar">✕</button>
      </div>
      <div id="cms-modal-body" class="cms-modal-body"></div>
    </div>
  </div>

  <template id="tpl-section-card">
    <article class="cms-section-card">
      <div class="cms-section-card-head">
        <div>
          <span class="badge badge-dark js-layout"></span>
          <h3 class="js-name"></h3>
          <p class="js-section-key"></p>
          <div class="js-section-helper"></div>
        </div>
        <div class="cms-card-actions">
          <button class="btn btn-dark js-edit-section" type="button">Editar sección</button>
          <button class="btn js-new-item" type="button">Nuevo ítem</button>
        </div>
      </div>
      <div class="cms-section-copy">
        <h4 class="js-title"></h4>
        <p class="js-subtitle"></p>
        <div class="js-content"></div>
      </div>
      <div class="cms-item-list js-items"></div>
    </article>
  </template>

  <template id="tpl-item-card">
    <div class="cms-item-card">
      <div class="cms-item-top">
        <div>
          <div class="cms-item-headline">
            <span class="cms-chip js-tag"></span>
            <span class="cms-state js-state"></span>
          </div>
          <h5 class="js-title"></h5>
          <small class="js-key"></small>
        </div>
        <div class="cms-card-actions">
          <button class="btn btn-dark js-edit-item" type="button">Editar</button>
          <button class="btn btn-outline js-delete-item" type="button">Eliminar</button>
        </div>
      </div>
      <div class="cms-quick-actions js-quick-actions"></div>
      <div class="cms-item-grid">
        <div class="js-copy"></div>
        <div class="js-image-wrap"></div>
      </div>
    </div>
  </template>

  <script src="js/admin.js"></script>
</body>
</html>
